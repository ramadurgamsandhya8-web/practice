      #     to: ${{ secrets.MAIL_TO }}
      #     from: ${{ secrets.AZURE_EMAIL }}
      #     body: |
      #       ICC Automation Tests Execution Result: ${{ job.status }}
            
      #       Repo: ${{ inputs.GIT_REPO_NAME }}
      #       Branch: ${{ inputs.BRANCH_NAME }}
      #       Environment: ${{ inputs.ENVIRONMENT }}
      
      #       Repo: ${{ inputs.GIT_REPO_NAME }}
      #       Branch: ${{ inputs.BRANCH_NAME }}
