name: Reusable Workflow - ICC Test Automation

on:
  workflow_call:
    inputs:
      GIT_REPO_NAME:
        required: true
        type: string
      GIT_DOMAIN:
        required: false
        type: string
        default: github.com
      BRANCH_NAME:
        required: true
        type: string
      ENVIRONMENT:
        required: true
        type: string
      IMAGE_NAME:
        required: true
        type: string
      project_type:
        required: true
        type: string
      TECHNOLOGY_TYPE:
        required: false
        type: string
        default: ''
        description: "Technology type (e.g., 'dotnet', 'java', 'python')"

    secrets:
      ACR_REGISTRY:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      AZURE_EMAIL:
        required: true
      AZURE_PASSWORD:
        required: true
      MAIL_TO:
        required: true
      DEVOPS_DEV_ATM_SP:
        required: true

jobs:
  # Check SonarCloud availability before running Sonar scan
  check-sonar:
    name: "Check SonarCloud Availability"
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - name: Check SonarCloud secrets and server reachability
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN not configured -- skipping SonarCloud scan."
            exit 0
          fi
          if curl -fsS --max-time 10 --head "https://sonarcloud.io" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SonarCloud server not reachable -- skipping scan."
          fi
  # 🔎 SonarQube Scan — runs in parallel with Polaris SAST
  sonar-scan:
    name: "🔎 SonarQube Scan"
    needs: [check-sonar]
    if: needs.check-sonar.outputs.available == 'true'
    uses: FiveB-DevOps/FiveB-MasterWorkflows/.github/workflows/sonar.yml@main
    with:
      FULL_REPO_NAME: ${{ inputs.GIT_REPO_NAME }}
      GIT_BRANCH_NAME: ${{ inputs.BRANCH_NAME }}
      project_type: ${{ inputs.project_type }}
      DEPLOY_ENV: ${{ inputs.ENVIRONMENT }}
    secrets: inherit

  # Check Polaris availability before running SAST scan
  check-polaris:
    name: "🔍 Check Polaris Availability"
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - name: Check Polaris secrets and server reachability
        id: check
        env:
          POLARIS_URL: ${{ secrets.POLARIS_SERVER_URL }}
          POLARIS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
        run: |
          if [ -z "${POLARIS_URL}" ] || [ -z "${POLARIS_TOKEN}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Polaris secrets not configured -- skipping SAST scan."
            exit 0
          fi
          if curl -fsS --max-time 10 --head "${POLARIS_URL}" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Polaris server not reachable -- skipping SAST scan."
          fi
  # Black Duck Polaris SAST Scan — runs in parallel with SonarCloud scan
  polaris-sast:
    name: "🛡️ Black Duck Polaris SAST Scan"
    needs: [ check-polaris ]
    if: needs.check-polaris.outputs.available == 'true'
    uses: FiveB-DevOps/FiveB-MasterWorkflows/.github/workflows/blackduck-polaris-sast-email-alerts.yml@main
    with:
      GIT_REPO_NAME:    ${{ inputs.GIT_REPO_NAME }}
      GIT_BRANCH_NAME:  ${{ inputs.GIT_BRANCH_NAME }}
      TECHNOLOGY_TYPE:  ${{ inputs.TECHNOLOGY_TYPE }}
    secrets: inherit

  build-test-deploy:
    name: Build, Push, Deploy & Run Tests
    runs-on: ubuntu-latest
    needs: [check-sonar, check-polaris]
    environment: ${{ inputs.ENVIRONMENT }}

    env:
      IMAGE_TAG: ${{ github.run_id }}
      IMAGE_FULL_NAME: ${{ secrets.ACR_REGISTRY }}/${{ inputs.IMAGE_NAME }}:${{ github.run_id }}
      AKS_RESOURCE_GROUP: rg-icc-dev
      AKS_CLUSTER_NAME: icc-aks-dev

    steps:
      # 📥 Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.GIT_REPO_NAME }}
          ref: ${{ inputs.BRANCH_NAME }}

      # 🔐 Login to ACR
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ⚙️ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🐳 Build & Push Docker Image
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_FULL_NAME }}

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.DEVOPS_DEV_ATM_SP }}

      # ⚙️ Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ⚙️ Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      # 🔍 Debug AKS Values
      - name: Debug AKS Values
        run: |
          echo "AKS_RESOURCE_GROUP=$AKS_RESOURCE_GROUP"
          echo "AKS_CLUSTER_NAME=$AKS_CLUSTER_NAME"

      # 📥 Get AKS Credentials
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      # 🟦 Install kubelogin
      - name: Install kubelogin
        run: |
          curl -LO https://github.com/Azure/kubelogin/releases/download/v0.0.25/kubelogin-linux-amd64.zip
          unzip kubelogin-linux-amd64.zip
          sudo mv bin/linux_amd64/kubelogin /usr/local/bin/

      # 🔄 Convert kubeconfig
      - name: Convert kubeconfig
        run: |
          kubelogin convert-kubeconfig -l azurecli

      # 🧪 Verify cluster connection
      - name: Verify Cluster
        run: kubectl get nodes

      # 🚀 Deploy using Helm
      - name: Helm Deploy
        run: |
          helm upgrade --install icc-test-automation ./src/helm \
            --namespace "${{ vars.NAMESPACE }}" \
            --create-namespace \
            --set image.repository=${{ secrets.ACR_REGISTRY }}/${{ inputs.IMAGE_NAME }} \
            --set image.tag=${{ github.run_id }} \
            --set env.mailTo="${{ secrets.MAIL_TO }}"\
            --set env.azureEmail="${{ secrets.AZURE_EMAIL }}" \
            --set env.azurePassword="${{ secrets.AZURE_PASSWORD }}"

      # ⏳ Wait for Job Completion
      - name: Wait for Job Completion
        run: |
          echo "Waiting for job to complete..."

          kubectl wait --for=condition=complete job \
            -l app=icc-test-automation \
            -n "${{ vars.NAMESPACE }}" \
            --timeout=30m || (
              echo "Job failed or timed out"
              kubectl get jobs -n "${{ vars.NAMESPACE }}"
              kubectl get pods -n "${{ vars.NAMESPACE }}"
              exit 1
            )

      # 📦 Get Pods
      - name: Get Pods
        run: kubectl get pods -n "${{ vars.NAMESPACE }}"

      # 📜 Fetch Logs
      - name: Fetch Job Logs
        run: |
          echo "Fetching Job Pod..."

          POD_NAME=$(kubectl get pods -n "${{ vars.NAMESPACE }}" \
            -l app=icc-test-automation \
            -o jsonpath="{.items[0].metadata.name}")

          echo "Pod: $POD_NAME"

          kubectl logs "$POD_NAME" -n "${{ vars.NAMESPACE }}" || true

